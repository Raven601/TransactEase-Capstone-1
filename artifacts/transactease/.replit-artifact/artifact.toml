kind = "web"
previewPath = "/"
title = "TransactEase POS"
version = "1.0.0"
id = "artifacts/transactease"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18578

[services.development]
run = "pnpm --filter @workspace/transactease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transactease", "run", "build" ]
publicDir = "artifacts/transactease/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18578"
BASE_PATH = "/"
